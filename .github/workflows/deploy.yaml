# Deploys the Docusaurus site to GitHub Pages
# Runs on every push to main, or manually via Actions tab
name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grants the job permission to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy Docusaurus site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4