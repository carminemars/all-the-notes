# Deploys the Docusaurus site to GitHub Pages
# Runs on every push to main, or manually via Actions tab
name: Deploy to Pages

on:
  push:
    branches: [main]       # auto-deploy on push to main
  workflow_dispatch:       # allows manual trigger from Actions tab

jobs:
  deploy:
    name: Build & deploy Docusaurus site
    runs-on: ubuntu-latest

    # "write" on contents is needed to push to the gh-pages branch
    permissions:
      contents: write

    steps:
      # Downloads your repo code onto the virtual machine
      - uses: actions/checkout@v4

      # Installs Node.js on the virtual machine
      - uses: actions/setup-node@v4
        with:
          node-version: 20       # 20 = current LTS
          cache: npm             # caches node_modules to speed up future runs

      # Installs dependencies (reads package-lock.json for EXACT versions)
      - run: npm ci

      # Builds the Docusaurus site → /build folder
      - run: npm run build

      # Pushes /build to the gh-pages branch
      # GitHub Pages serves the site from that branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # auto-generated by GitHub
          publish_dir: ./build
          force_orphan: true    # keeps only 1 commit on gh-pages (clean)