# Workflow name, shown in the GitHub Actions interface
name: Deploy to Pages

# TRIGGER: when to run this workflow
on:
  push:
    branches: [main]   # runs only when you push to the "main" branch
                       # change to "master" if that's your main branch name

# Jobs are the blocks of work to execute
jobs:

  # Job name (you can call it whatever you want)
  deploy:
    name: Build Docusaurus project

    # Type of virtual machine to run the workflow on (free Ubuntu on GitHub)
    runs-on: ubuntu-latest

    # Permissions required by the workflow:
    # "write" on contents is needed to push to the gh-pages branch
    permissions:
      contents: write

    # List of steps executed in sequence (if one fails, everything stops)
    steps:

      # Downloads your repo code onto the virtual machine
      - uses: actions/checkout@v4

      # Installs Node.js on the virtual machine
      - uses: actions/setup-node@v4
        with:
          node-version: 20   # Node version to use (20 = current LTS)
          cache: npm         # caches node_modules to speed up future runs

      # Installs project dependencies (like npm install but safer for CI)
      # "ci" reads package-lock.json and installs EXACTLY those versions, without updating anything
      - run: npm ci

      # Builds the Docusaurus site and generates the /build folder
      - run: npm run build

      # Takes the /build folder and pushes it to the gh-pages branch of your repo
      # GitHub Pages will serve the site directly from that branch
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Token automatically generated by GitHub, no configuration needed
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Folder to publish (Docusaurus outputs the compiled site into /build)
          publish_dir: ./build